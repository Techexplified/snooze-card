<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pause Card</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1e1f26;
        font-family: sans-serif;
        padding: 16px;
      }
      .card {
        background: #2d2f3a;
        border-radius: 12px;
        padding: 20px;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .icon-wrap {
        width: 52px;
        height: 52px;
        background: #579dff;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-wrap img {
        width: 28px;
        height: 28px;
        filter: brightness(0) invert(1);
      }
      .icon-wrap.resume {
        background: #16a34a;
      }
      h2 {
        font-size: 1rem;
        font-weight: 700;
      }
      p {
        font-size: 0.75rem;
        color: #9ca3af;
        text-align: center;
      }
      button {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
        background: #579dff;
        color: white;
        transition: background 0.15s;
      }
      button:hover {
        background: #4a8fe0;
      }
      button.resume {
        background: #16a34a;
      }
      button.resume:hover {
        background: #15803d;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrap" id="iconWrap">
        <img
          id="iconImg"
          src="https://cdn.jsdelivr.net/npm/bootstrap-icons/icons/pause-circle-fill.svg"
          alt="pause"
        />
      </div>
      <h2 id="title">Pause Card</h2>
      <p id="msg">
        Open a card and use the <strong>Pause Card</strong> button inside the
        card to pause it.
      </p>
      <button id="btn" style="display: none"></button>
    </div>

    <script>
      var t = TrelloPowerUp.iframe();

      t.render(function () {
        var btn = document.getElementById("btn");
        var msg = document.getElementById("msg");
        var title = document.getElementById("title");
        var iconWrap = document.getElementById("iconWrap");
        var iconImg = document.getElementById("iconImg");

        t.context().then(function (ctx) {
          if (!ctx.card) {
            msg.innerHTML =
              "Open a card and use the <strong>Pause Card</strong> button inside the card to pause it.";
            btn.style.display = "none";
            return;
          }

          t.get("card", "shared", "paused").then(function (paused) {
            // Update icon
            iconImg.src = paused
              ? "https://cdn.jsdelivr.net/npm/bootstrap-icons/icons/play-circle-fill.svg"
              : "https://cdn.jsdelivr.net/npm/bootstrap-icons/icons/pause-circle-fill.svg";
            iconWrap.className = "icon-wrap" + (paused ? " resume" : "");

            // Update title
            title.textContent = paused ? "Resume Card" : "Pause Card";

            // Update message
            msg.textContent = paused
              ? "This card is currently paused. Click below to resume."
              : "Pause this card to temporarily hide it from the board.";

            // Update button
            btn.textContent = paused ? "▶ Resume Card" : "⏸ Pause Card";
            btn.className = paused ? "resume" : "";
            btn.style.display = "block";

            btn.onclick = function () {
              var API_KEY = "add761039ac8e9e90f29945c53c99805";
              var TOKEN =
                "ATTA498f3b49e37c782721c7b4b35e893ca801b5fbe1644c9331b53976ae2162fd49A46DDF8E";

              t.get("card", "shared", "paused").then(function (currentPaused) {
                var newPausedState = !currentPaused;

                return t
                  .card("id")
                  .then(function (card) {
                    // Archive if we are pausing, Un-archive if we are resuming
                    return fetch(
                      `https://api.trello.com/1/cards/${card.id}?closed=${newPausedState}&key=${API_KEY}&token=${TOKEN}`,
                      { method: "PUT" },
                    );
                  })
                  .then(function () {
                    return t.set("card", "shared", "paused", newPausedState);
                  })
                  .then(function () {
                    t.closePopup();
                  });
              });
            };
          });
        });
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pause Card</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1e1f26;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 16px;
        color: white;
      }
      .card {
        background: #2d2f3a;
        border-radius: 12px;
        padding: 20px;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .icon-wrap {
        width: 52px;
        height: 52px;
        background: #579dff;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-wrap img {
        width: 28px;
        height: 28px;
        filter: brightness(0) invert(1);
      }
      h2 {
        font-size: 1rem;
        font-weight: 700;
      }
      p {
        font-size: 0.75rem;
        color: #9ca3af;
        text-align: center;
      }

      /* Paused Cards List Styling */
      .section-title {
        font-size: 12px;
        font-weight: 700;
        color: #8c96a8;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 12px;
      }
      .paused-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .paused-item {
        background: white;
        color: #1e1f26;
        border-radius: 12px;
        padding: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .paused-info h3 {
        font-size: 15px;
        color: #0c66e4;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .paused-meta {
        font-size: 12px;
        color: #579dff;
      }
      .unpause-btn {
        background: #0c66e4;
        color: white;
        border: none;
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      .unpause-btn:hover {
        background: #0055cc;
      }
      .empty-msg {
        font-size: 13px;
        color: #8c96a8;
        font-style: italic;
        text-align: center;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <!-- Notice Section -->
    <div class="card">
      <div class="icon-wrap">
        <img
          src="https://cdn.jsdelivr.net/npm/bootstrap-icons/icons/pause-circle-fill.svg"
          alt="pause"
        />
      </div>
      <h2>Pause Card</h2>
      <p>
        Open a card and use the <strong>Pause Card</strong> button inside the
        card to pause (archive) it.
      </p>
    </div>

    <!-- Dynamic Paused Cards Section -->
    <div class="section-title">Paused Cards</div>
    <div class="paused-list" id="pausedList">
      <div class="empty-msg">Loading paused cards...</div>
    </div>

    <script>
      var t = TrelloPowerUp.iframe();
      var APP_KEY = "add761039ac8e9e90f29945c53c99805"; // Your Trello API key

      // Formatter helpers
      function timeAgo(isoString) {
        if (!isoString) return "";
        var docDate = new Date(isoString);
        var now = new Date();
        var diffMs = now - docDate;
        var diffMins = Math.round(diffMs / 60000);
        var diffHours = Math.round(diffMins / 60);

        if (diffMins < 60) return "(Paused " + diffMins + " minutes ago)";
        if (diffHours < 24) return "(Paused " + diffHours + " hours ago)";
        return "(Paused " + Math.round(diffHours / 24) + " days ago)";
      }

      // Helper to request token if missing
      function getToken(t) {
        return t.get("member", "private", "token").then(function (token) {
          if (token) return token;
          return t
            .popup({
              title: "Authorize Pause Card",
              url: t.signUrl("./authorize.html"),
              height: 200,
            })
            .then(function () {
              return t.get("member", "private", "token");
            });
        });
      }

      // Render loop
      t.render(function () {
        var listContainer = document.getElementById("pausedList");

        Promise.all([t.board("id"), getToken(t)])
          .then(function (results) {
            var boardId = results[0].id;
            var token = results[1];

            if (!token) {
              listContainer.innerHTML =
                '<div class="empty-msg">Please authorize the power-up first.</div>';
              return;
            }

            // Fetch closed (archived) cards on the current board
            fetch(
              `https://api.trello.com/1/boards/${boardId}/cards/closed?key=${APP_KEY}&token=${token}`,
            )
              .then((res) => res.json())
              .then(async (cards) => {
                listContainer.innerHTML = ""; // Clear loader

                var pausedCardsFound = 0;

                // Iterate over closed cards and check shared plugin data
                for (var card of cards) {
                  // Retrieve the plugin data specifically for this card item
                  var isPaused = await t.get(
                    card.id,
                    "shared",
                    "paused",
                    false,
                  );

                  if (isPaused) {
                    pausedCardsFound++;
                    var pausedAt = await t.get(card.id, "shared", "pausedAt");

                    var itemDiv = document.createElement("div");
                    itemDiv.className = "paused-item";
                    itemDiv.innerHTML = `
                  <div class="paused-info">
                    <h3>${card.name}</h3>
                    <div class="paused-meta">${timeAgo(pausedAt)}</div>
                  </div>
                  <button class="unpause-btn" data-id="${card.id}">UN-PAUSE</button>
                `;
                    listContainer.appendChild(itemDiv);
                  }
                }

                if (pausedCardsFound === 0) {
                  listContainer.innerHTML =
                    '<div class="empty-msg">No paused cards found on this board.</div>';
                }

                // Bind click actions to the dynamically generated unpause buttons
                var buttons = listContainer.querySelectorAll(".unpause-btn");
                buttons.forEach(function (btn) {
                  btn.onclick = function (e) {
                    var targetCardId = e.target.getAttribute("data-id");
                    e.target.disabled = true;
                    e.target.textContent = "Resuming...";

                    // 1. Tell the backend to un-archive the card (closed=false)
                    fetch("https://snooze-card-trello.vercel.app/api/card", {
                      method: "POST",
                      headers: { "Content-Type": "application/json" },
                      body: JSON.stringify({
                        cardId: targetCardId,
                        closed: false,
                        token: token,
                      }),
                    })
                      .then(function () {
                        // 2. Clear plugin state metadata for this card
                        return t.set(targetCardId, "shared", {
                          paused: false,
                          pauseUntil: null,
                          pausedAt: null,
                        });
                      })
                      .then(function () {
                        // 3. Close the popup to complete transaction UI refresh
                        t.closePopup();
                      })
                      .catch(function (err) {
                        alert("Failed to un-pause card.");
                        e.target.disabled = false;
                        e.target.textContent = "UN-PAUSE";
                      });
                  };
                });

                // Adjust popup window dynamically depending on content size
                t.sizeTo(document.body);
              });
          })
          .catch(function () {
            listContainer.innerHTML =
              '<div class="empty-msg">Error loading board items.</div>';
          });
      });
    </script>
  </body>
</html>

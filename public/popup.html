<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
      body {
        background: transparent; /* Allows Trello background to show through */
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 4px;
        margin: 0;
        overflow: hidden;
      }
      .container {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px;
        background: #2d2f3a;
        border-radius: 8px;
        color: white;
      }
      .info {
        flex-grow: 1;
      }
      h2 {
        font-size: 0.85rem;
        margin: 0;
        color: #fff;
      }
      p {
        font-size: 0.7rem;
        color: #9ca3af;
        margin: 4px 0 0 0;
      }

      button {
        padding: 6px 12px;
        border-radius: 5px;
        border: none;
        font-weight: 600;
        font-size: 0.75rem;
        cursor: pointer;
        background: #579dff;
        color: white;
        white-space: nowrap;
      }
      button.resume {
        background: #16a34a;
      }

      /* Dark mode/Standard Trello adjustments */
      .is-board-button-popup {
        background: #1e1f26;
        padding: 16px;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="main-container" class="container">
      <div class="info">
        <h2 id="title">Pause Card</h2>
        <p id="msg">Loading...</p>
      </div>
      <button id="btn" style="display: none"></button>
    </div>

    <script>
      var t = TrelloPowerUp.iframe();

      t.context().then(function (ctx) {
        var btn = document.getElementById("btn");
        var msg = document.getElementById("msg");
        var container = document.getElementById("main-container");

        // Check if we are in a popup from a board button
        if (!ctx.card) {
          container.classList.add("is-board-button-popup");
          msg.innerHTML = "Open a card to use this feature.";
          return;
        }

        t.get("card", "shared", "paused").then(function (paused) {
          msg.textContent = paused
            ? "This card is paused."
            : "Pause this card to hide it.";
          btn.textContent = paused ? "▶ Resume" : "⏸ Pause";
          btn.className = paused ? "resume" : "";
          btn.style.display = "block";

          btn.onclick = function () {
            t.get("card", "shared", "paused")
              .then(function (currentPaused) {
                return t.set("card", "shared", "paused", !currentPaused);
              })
              .then(function () {
                // If it's a popup, close it. If it's a section, just refresh.
                if (t.isPopup()) {
                  t.closePopup();
                }
              });
          };
        });
      });
    </script>
  </body>
</html>

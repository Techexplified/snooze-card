<!doctype html>
<html>
  <head>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <button
      id="auth-btn"
      style="
        width: 100%;
        padding: 10px;
        background: #579dff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      "
    >
      Allow Access to Trello
    </button>
    <script>
      var t = TrelloPowerUp.iframe();
      var API_KEY = "add761039ac8e9e90f29945c53c99805";

      document
        .getElementById("auth-btn")
        .addEventListener("click", function () {
          t.authorize(
            "https://trello.com/1/authorize?expiration=never&name=PauseCard&scope=read,write&response_type=token&key=" +
              API_KEY,
          )
            .then(function (token) {
              return t
                .set("member", "private", "token", token)
                .then(function () {
                  return token; // 👈 IMPORTANT: return token
                });
            })
            .then(function (token) {
              return t.closePopup().then(function () {
                return token; // 👈 pass token back to parent
              });
            });
        });
    </script>
  </body>
</html>

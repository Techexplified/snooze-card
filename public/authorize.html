<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorize Pause Card</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1e1f26;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e2e4ea;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .icon {
        width: 48px;
        height: 48px;
        background: #579dff;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        margin-top: 8px;
      }
      h2 {
        font-size: 15px;
        font-weight: 700;
        text-align: center;
      }
      p {
        font-size: 12px;
        color: #9ca3af;
        text-align: center;
        line-height: 1.5;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #579dff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover {
        background: #4a8fe0;
      }
      button:disabled {
        background: #3d4050;
        color: #6b7280;
        cursor: not-allowed;
      }
      .status {
        font-size: 12px;
        color: #9ca3af;
        text-align: center;
        min-height: 18px;
      }
      .status.success {
        color: #16a34a;
      }
      .status.error {
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <div class="icon">⏸</div>
    <h2>Authorize Pause Card</h2>
    <p>
      To pause and resume cards, this Power-Up needs permission to manage your
      Trello cards.
    </p>
    <button id="authBtn">Connect to Trello</button>
    <div class="status" id="status"></div>

    <script>
      var t = TrelloPowerUp.iframe();
      var APP_KEY = "add761039ac8e9e90f29945c53c99805";

      var authBtn = document.getElementById("authBtn");
      var status = document.getElementById("status");

      // Listen for token posted back from token-handler.html
      window.addEventListener("message", function (e) {
        if (!e.data || !e.data.token) return;
        var token = e.data.token;
        status.textContent = "Saving authorization...";
        status.className = "status";
        t.set("member", "private", "token", token).then(function () {
          status.textContent = "✓ Authorized! Closing...";
          status.className = "status success";
          setTimeout(function () {
            t.closePopup();
          }, 800);
        });
      });

      authBtn.addEventListener("click", function () {
        authBtn.disabled = true;
        authBtn.textContent = "Opening Trello...";
        status.textContent = "Complete the authorization in the new tab.";
        status.className = "status";

        var returnUrl =
          "https://snooze-card-trello.vercel.app/token-handler.html";
        var authUrl =
          "https://trello.com/1/authorize" +
          "?expiration=never" +
          "&name=Pause%20Card" +
          "&scope=read%2Cwrite" +
          "&response_type=token" +
          "&key=" +
          APP_KEY +
          "&return_url=" +
          encodeURIComponent(returnUrl) +
          "&callback_method=postMessage";

        window.open(authUrl, "_blank", "width=520,height=620");
      });

      t.render(function () {
        t.sizeTo(document.body);
      });
    </script>
  </body>
</html>

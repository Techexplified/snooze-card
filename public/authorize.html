<!doctype html>
<html>
  <head>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <button
      id="auth-btn"
      style="
        width: 100%;
        padding: 10px;
        background: #579dff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      "
    >
      Allow Access to Trello
    </button>
    <p
      id="status"
      style="font-size: 12px; color: #666; text-align: center; margin-top: 8px"
    ></p>

    <script>
      var t = TrelloPowerUp.iframe();
      var API_KEY = "add761039ac8e9e90f29945c53c99805";

      document
        .getElementById("auth-btn")
        .addEventListener("click", function () {
          var status = document.getElementById("status");
          status.textContent = "Authorizing...";

          t.authorize(
            "https://trello.com/1/authorize?expiration=never&name=PauseCard&scope=read,write&response_type=token&key=" +
              API_KEY,
          )
            .then(function (token) {
              if (!token) {
                status.textContent = "Authorization failed. Please try again.";
                return;
              }
              status.textContent = "Saving...";

              // ✅ Wait for set() to fully complete before closing
              return t
                .set("member", "private", "token", token)
                .then(function () {
                  status.textContent = "Done!";
                  return t.closePopup();
                });
            })
            .catch(function (err) {
              console.error("Auth error:", err);
              status.textContent = "Error: " + (err.message || "Unknown error");
            });
        });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <script>
      var ICON =
        "data:image/svg+xml;base64," +
        btoa(
          '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#42526e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="9" y2="15"/><line x1="15" y1="9" x2="15" y2="15"/></svg>',
        );

      function formatDate(isoString) {
        var d = new Date(isoString);
        return d.toLocaleString("en-US", {
          month: "long",
          day: "numeric",
          year: "numeric",
          hour: "numeric",
          minute: "2-digit",
          hour12: true,
        });
      }

      async function getApiClient(t) {
        const client = await t.getRestApi();
        const isAuthorized = await client.isAuthorized();
        if (!isAuthorized) {
          await client.authorize({ scope: "read,write" });
        }
        return client;
      }

      async function archiveCard(t, client) {
        const card = await t.card("id");
        await client.put(`cards/${card.id}`, { closed: true });
      }

      async function unarchiveCard(t, client) {
        const card = await t.card("id");
        await client.put(`cards/${card.id}`, { closed: false });
      }

      function getPauseItems(t) {
        var now = new Date();

        function msFrom(ms) {
          return new Date(now.getTime() + ms);
        }
        function nextDay(hour) {
          var d = new Date(now);
          d.setDate(d.getDate() + 1);
          d.setHours(hour, 0, 0, 0);
          return d;
        }
        function daysFrom(days) {
          return new Date(now.getTime() + days * 24 * 60 * 60 * 1000);
        }

        var options = [
          { text: "In 1 hour", date: msFrom(1 * 60 * 60 * 1000) },
          { text: "In 2 hours", date: msFrom(2 * 60 * 60 * 1000) },
          { text: "In 4 hours", date: msFrom(4 * 60 * 60 * 1000) },
          { text: "Tomorrow morning", date: nextDay(9) },
          { text: "Tomorrow afternoon", date: nextDay(14) },
          { text: "In 1 days", date: daysFrom(1) },
          { text: "In 2 days", date: daysFrom(2) },
          { text: "In 4 days", date: daysFrom(4) },
          { text: "In 1 week", date: daysFrom(7) },
          { text: "In 2 weeks", date: daysFrom(14) },
          { text: "In 1 month", date: daysFrom(30) },
        ];

        function getPauseItems(t) {
          var now = new Date();
          // ... your existing msFrom, nextDay, daysFrom functions ...

          var options = [
            // ... your existing options array ...
          ];

          return options.map(function (opt) {
            return {
              text: opt.text,
              callback: function (t) {
                // Return Promise - Trello handles it
                return (async function () {
                  try {
                    const client = await t.getRestApi();
                    const isAuthorized = await client.isAuthorized();
                    if (!isAuthorized)
                      await client.authorize({ scope: "read,write" });

                    const pauseUntil = opt.date.toISOString();
                    await t.set("card", "shared", {
                      paused: true,
                      pauseUntil: pauseUntil,
                      pausedAt: new Date().toISOString(),
                    });
                    const card = await t.card("id");
                    await client.put(`cards/${card.id}`, { closed: true });
                    return t.closePopup();
                  } catch (e) {
                    console.error("Pause error:", e);
                    // Don't close popup on error so user sees it
                  }
                })();
              },
            };
          });
        }
      }

      window.TrelloPowerUp.initialize(
        {
          "board-buttons": function (t) {
            return [
              {
                text: "Pause Card",
                icon: { dark: ICON, light: ICON },
                callback: function (t) {
                  return t.popup({
                    title: "Pause Card",
                    url: t.signUrl("./popup.html"),
                    height: 220,
                  });
                },
              },
            ];
          },

          "card-buttons": function (t) {
            return t
              .get("card", "shared", "paused", false)
              .then(function (paused) {
                if (paused) {
                  return [
                    {
                      icon: ICON,
                      text: "Resume Card",
                      callback: function (t) {
                        // Direct resume, no popup
                        return t.popup({
                          // Use popup.html for resume too
                          title: "Resume Card",
                          url: t.signUrl("./popup.html"),
                          height: 220,
                        });
                      },
                    },
                  ];
                }
                return [
                  {
                    icon: ICON,
                    text: "Pause Card",
                    callback: function (t) {
                      return t.popup({
                        title: "Pause Card",
                        url: t.signUrl("./popup.html"),
                        height: 220,
                      });
                    },
                  },
                ];
              });
          },

          "card-back-section": function (t) {
            return t
              .get("card", "shared", "paused", false)
              .then(function (paused) {
                if (!paused) return null;
                return {
                  title: "Card Paused Until",
                  icon: ICON,
                  content: {
                    type: "iframe",
                    url: t.signUrl("./section.html"),
                    height: 70,
                  },
                };
              });
          },

          "card-detail-badges": function (t) {
            return t
              .get("card", "shared", "paused", false)
              .then(function (paused) {
                if (!paused) return [];
                return t
                  .get("card", "shared", "pauseUntil")
                  .then(function (pauseUntil) {
                    return [
                      {
                        icon: ICON,
                        title: "Card Paused Until",
                        text: pauseUntil ? formatDate(pauseUntil) : "Paused",
                        color: "blue",
                      },
                    ];
                  });
              });
          },
        },
        {
          appKey: "add761039ac8e9e90f29945c53c99805",
          appName: "Pause Card",
          appAuthor: "Explified",
        },
      );
    </script>
  </body>
</html>

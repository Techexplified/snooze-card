<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <script>
      var ICON = "https://cdn.jsdelivr.net/npm/bootstrap-icons/icons/alarm.svg"; // Matches screenshot style

      window.TrelloPowerUp.initialize({
        "board-buttons": function (t) {
          return [
            {
              text: "Pause Card",
              icon: { dark: ICON, light: ICON },
              callback: function (t) {
                return t.popup({
                  title: "Pause Card",
                  url: "./popup.html", // Using relative path
                  height: 220,
                });
              },
            },
          ];
        },

        "card-buttons": function (t) {
          return t.get("card", "shared", "paused").then(function (paused) {
            return [
              {
                icon: ICON,
                text: paused ? "Resume Card" : "Pause Card",
                callback: function (t) {
                  return t.popup({
                    title: "Pause Card",
                    url: "./popup.html",
                    height: 220,
                  });
                },
              },
            ];
          });
        },

        // THIS IS WHAT CREATES THE SECTION IN THE SCREENSHOT
        "card-back-section": function (t) {
          return {
            title: "Snooze Card",
            icon: ICON,
            content: {
              type: "iframe",
              url: t.signUrl("./popup.html"), // We can reuse your popup logic here
              height: 80, // Lower height for the inline section
            },
          };
        },

        "card-badges": function (t) {
          return t.get("card", "shared", "paused").then(function (paused) {
            if (!paused) return [];
            return [
              {
                icon: "https://cdn.jsdelivr.net/npm/bootstrap-icons/icons/pause-circle-fill.svg",
                text: "Paused",
                color: "blue",
              },
            ];
          });
        },
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <script>
      var PAUSE_ICON =
        "https://cdn.jsdelivr.net/npm/bootstrap-icons/icons/pause-circle.svg";
      var PAUSE_FILL_ICON =
        "https://cdn.jsdelivr.net/npm/bootstrap-icons/icons/pause-circle-fill.svg";
      var POPUP_URL = "https://snooze-card-trello.vercel.app/popup.html";

      window.TrelloPowerUp.initialize({
        "board-buttons": function (t) {
          return [
            {
              text: "Pause Card",
              icon: {
                dark: PAUSE_ICON,
                light: PAUSE_ICON,
              },
              callback: function (t) {
                return t.popup({
                  title: "Pause Card",
                  url: POPUP_URL,
                  height: 220,
                });
              },
            },
          ];
        },

        "card-buttons": function (t) {
          return t.get("card", "shared", "paused").then(function (paused) {
            return [
              {
                icon: paused ? PAUSE_FILL_ICON : PAUSE_ICON,
                text: paused ? "Resume Card" : "Pause Card",
                callback: function (t) {
                  return t.popup({
                    title: paused ? "Resume Card" : "Pause Card",
                    url: POPUP_URL,
                    height: 220,
                  });
                },
              },
            ];
          });
        },

        "card-badges": function (t) {
          return t.get("card", "shared", "paused").then(function (paused) {
            if (!paused) return [];
            return [
              {
                icon: PAUSE_FILL_ICON,
                text: "Paused",
                color: "blue",
              },
            ];
          });
        },

        // Refresh badges when card data changes
        "card-detail-badges": function (t) {
          return t.get("card", "shared", "paused").then(function (paused) {
            if (!paused) return [];
            return [
              {
                title: "Status",
                text: "Paused",
                color: "blue",
              },
            ];
          });
        },
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <script>
      // Replace this with your actual Trello API Key
      var API_KEY = "add761039ac8e9e90f29945c53c99805";

      var ICON =
        "data:image/svg+xml;base64," +
        btoa(
          '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#42526e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="9" y2="15"/><line x1="15" y1="9" x2="15" y2="15"/></svg>',
        );

      function formatDate(isoString) {
        var d = new Date(isoString);
        return d.toLocaleString("en-US", {
          month: "long",
          day: "numeric",
          year: "numeric",
          hour: "numeric",
          minute: "2-digit",
          hour12: true,
        });
      }

      // Helper to ensure we have a token before making API calls
      function getVerifyToken(t) {
        return t.get("member", "private", "token").then(function (token) {
          if (token) return token;

          // Open the simple authorize.html page to handle the OAuth flow
          return t.authorize("./authorize.html", {
            height: 140,
            width: 400,
            validToken: function (token) {
              return !!token;
            },
          });
        });
      }

      function getPauseItems(t) {
        var now = new Date();
        function msFrom(ms) {
          return new Date(now.getTime() + ms);
        }
        function nextDay(hour) {
          var d = new Date(now);
          d.setDate(d.getDate() + 1);
          d.setHours(hour, 0, 0, 0);
          return d;
        }
        function daysFrom(days) {
          return new Date(now.getTime() + days * 24 * 60 * 60 * 1000);
        }

        var options = [
          { text: "In 1 hour", date: msFrom(1 * 60 * 60 * 1000) },
          { text: "In 2 hours", date: msFrom(2 * 60 * 60 * 1000) },
          { text: "Tomorrow morning", date: nextDay(9) },
          { text: "In 1 day", date: daysFrom(1) },
          { text: "In 2 days", date: daysFrom(2) },
          { text: "In 1 week", date: daysFrom(7) },
        ];

        return options.map(function (opt) {
          return {
            text: opt.text,
            callback: function (t) {
              return getVerifyToken(t).then(function (token) {
                if (!token) return;

                var pauseUntil = opt.date.toISOString();

                // 1. Save pause metadata
                return t
                  .set("card", "shared", {
                    paused: true,
                    pauseUntil: pauseUntil,
                    pausedAt: new Date().toISOString(),
                  })
                  .then(function () {
                    return t.card("id");
                  })
                  .then(function (card) {
                    // 2. Archive the card (REST API)
                    return fetch(
                      "https://api.trello.com/1/cards/" +
                        card.id +
                        "?closed=true&key=" +
                        API_KEY +
                        "&token=" +
                        token,
                      { method: "PUT" },
                    );
                  })
                  .then(function () {
                    return t.closePopup();
                  });
              });
            },
          };
        });
      }

      window.TrelloPowerUp.initialize({
        "authorization-status": function (t) {
          return t.get("member", "private", "token").then(function (token) {
            return { authorized: !!token };
          });
        },

        "show-authorization": function (t) {
          return t.popup({
            title: "Authorize Pause Card",
            url: "./authorize.html",
            height: 140,
          });
        },

        "board-buttons": function (t) {
          return [
            {
              text: "Pause Card",
              icon: { dark: ICON, light: ICON },
              callback: function (t) {
                return t.popup({
                  title: "Pause Card",
                  url: t.signUrl("./popup.html"),
                  height: 220,
                });
              },
            },
          ];
        },

        "card-buttons": function (t) {
          return t
            .get("card", "shared", "paused", false)
            .then(function (paused) {
              if (paused) {
                return [
                  {
                    icon: ICON,
                    text: "Resume Card",
                    callback: function (t) {
                      return getVerifyToken(t).then(function (token) {
                        if (!token) return;

                        return t
                          .card("id")
                          .then(function (card) {
                            // 1. Un-archive the card
                            return fetch(
                              "https://api.trello.com/1/cards/" +
                                card.id +
                                "?closed=false&key=" +
                                API_KEY +
                                "&token=" +
                                token,
                              { method: "PUT" },
                            );
                          })
                          .then(function () {
                            // 2. Clear pause metadata
                            return t.set("card", "shared", {
                              paused: false,
                              pauseUntil: null,
                              pausedAt: null,
                            });
                          })
                          .then(function () {
                            t.closePopup();
                          });
                      });
                    },
                  },
                ];
              }

              return [
                {
                  icon: ICON,
                  text: "Pause Card",
                  callback: function (t) {
                    return t.popup({
                      title: "Pause Until",
                      items: getPauseItems(t),
                    });
                  },
                },
              ];
            });
        },

        "card-back-section": function (t) {
          return t
            .get("card", "shared", "paused", false)
            .then(function (paused) {
              if (!paused) return null;
              return {
                title: "Card Paused Until",
                icon: ICON,
                content: {
                  type: "iframe",
                  url: t.signUrl("./section.html"),
                  height: 70,
                },
              };
            });
        },

        "card-detail-badges": function (t) {
          return t
            .get("card", "shared", "paused", false)
            .then(function (paused) {
              if (!paused) return [];
              return t
                .get("card", "shared", "pauseUntil")
                .then(function (pauseUntil) {
                  return [
                    {
                      icon: ICON,
                      title: "Card Paused Until",
                      text: pauseUntil ? formatDate(pauseUntil) : "Paused",
                      color: "blue",
                    },
                  ];
                });
            });
        },
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
        padding: 8px 0;
      }
      .label {
        font-size: 0.75rem;
        font-weight: 600;
        color: #5e6c84;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .date-badge {
        display: inline-block;
        background: #091e420f;
        border-radius: 4px;
        padding: 6px 12px;
        font-size: 0.875rem;
        font-weight: 500;
        color: #172b4d;
      }
    </style>
  </head>
  <body>
    <div class="label">Card Paused Until</div>
    <div class="date-badge" id="date">Loading...</div>
    <script>
      var t = TrelloPowerUp.iframe();
      t.get("card", "shared", "pauseUntil").then(function (pauseUntil) {
        var el = document.getElementById("date");
        if (pauseUntil) {
          var d = new Date(pauseUntil);
          el.textContent = d.toLocaleString("en-US", {
            month: "long",
            day: "numeric",
            year: "numeric",
            hour: "numeric",
            minute: "2-digit",
            hour12: true,
          });
        } else {
          el.textContent = "Unknown";
        }
        t.sizeTo(document.body);
      });
    </script>
  </body>
</html>

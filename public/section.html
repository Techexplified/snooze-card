<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        background: transparent;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
      }
      .badge {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #e3f2fd;
        border-radius: 8px;
        padding: 8px 12px;
      }
      span {
        font-size: 0.85rem;
        color: #1565c0;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="badge">⏸️ <span>This card is currently paused.</span></div>
  </body>
</html>

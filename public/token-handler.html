<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Authorizing...</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #1e1f26;
        color: #e2e4ea;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div id="msg">Authorizing, please wait...</div>
    <script>
      // Trello posts the token into the URL hash: #token=xxxxx
      var hash = window.location.hash;
      var token = null;

      if (hash && hash.indexOf("token=") !== -1) {
        token = hash.split("token=")[1].split("&")[0];
      }

      if (token) {
        document.getElementById("msg").textContent =
          "✓ Authorized! You can close this tab.";
        // Post token back to the authorize.html popup (the opener)
        if (window.opener) {
          window.opener.postMessage({ token: token }, "*");
          setTimeout(function () {
            window.close();
          }, 1000);
        }
      } else {
        document.getElementById("msg").textContent =
          "Authorization failed. Please close this tab and try again.";
      }
    </script>
  </body>
</html>
